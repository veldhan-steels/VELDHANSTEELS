<!DOCTYPE html>
<html>

<head>
<title>Veldhan Steels</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input,select{
padding:10px;
margin:6px;
width:90%;
font-size:16px;
}

button{
padding:15px 25px;
font-size:18px;
background:#25D366;
border:none;
color:white;
margin-top:15px;
}

</style>
</head>

<body>

<h1>Veldhan Steels</h1>
<p>Bright Steel Bars • EN Series • Alloys</p>

<h2>Order Enquiry</h2>

<select id="grade">
<option>MS Bright</option>
<option>EN8</option>
<option>EN19</option>
<option>EN24</option>
<option>EN31</option>
<option>OHNS</option>
<option>HCHCR</option>
<option>D2</option>
<option>D3</option>
</select>

<select id="shape">
<option>Round</option>
<option>Flat</option>
<option>Square</option>
<option>Hexagon</option>
</select>

<input id="size" placeholder="Width / Diameter">

<input id="thickness" placeholder="Thickness">

<input id="length" placeholder="Cutting Length">

<input id="qty" placeholder="Quantity">

<input id="name" placeholder="Customer Name">

<input id="company" placeholder="Company Name">

<input id="phone" placeholder="Phone">

<input id="location" placeholder="Location">

<br><br>

<button onclick="send()">Send Enquiry</button>


<script>

function send(){

let grade = document.getElementById("grade").value;
let shape = document.getElementById("shape").value;
let size = document.getElementById("size").value;
let thickness = document.getElementById("thickness").value;
let length = document.getElementById("length").value;
let qty = document.getElementById("qty").value;
let name = document.getElementById("name").value;
let company = document.getElementById("company").value;
let phoneInput = document.getElementById("phone").value;
let location = document.getElementById("location").value;

let phone="919994609695";

let text="New Order Enquiry - Veldhan Steels%0A%0A"
+"Grade: "+grade+"%0A"
+"Shape: "+shape+"%0A"
+"Size / Diameter: "+size+"%0A"
+"Thickness: "+thickness+"%0A"
+"Cutting Length: "+length+"%0A"
+"Quantity: "+qty+"%0A"
+"Customer Name: "+name+"%0A"
+"Company: "+company+"%0A"
+"Phone: "+phoneInput+"%0A"
+"Location: "+location;

window.open("https://wa.me/"+phone+"?text="+text);

}

</script>

</body>
</html>
