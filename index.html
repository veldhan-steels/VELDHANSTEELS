<!DOCTYPE html>
<html>

<head>

<title>Veldhan Steels</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.item{
border:1px solid #444;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

input,select{
padding:10px;
margin:5px;
width:95%;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:6px;
}

.addbtn{
background:#2196F3;
color:white;
}

.sendbtn{
background:#25D366;
color:white;
}

.removebtn{
background:#f44336;
color:white;
}

</style>

</head>

<body>

<h2>Veldhan Steels</h2>
<p>Bright Steel Bars • EN Series • Alloys</p>

<div id="items"></div>

<button class="addbtn" onclick="addItem()">Add Another Item</button>

<br><br>

<input id="name" placeholder="Customer Name">
<input id="company" placeholder="Company Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<br><br>

<button class="sendbtn" onclick="send()">Send Enquiry</button>

<script>

let itemCount = 0;

function addItem(){

itemCount++;

let container=document.getElementById("items");

let div=document.createElement("div");

div.className="item";
div.id="item"+itemCount;

div.innerHTML=
"<h3>Item "+itemCount+"</h3>"+

"<select id='grade"+itemCount+"' onchange='updateShape("+itemCount+")'>"+
"<option>MS Bright</option>"+
"<option>EN8</option>"+
"<option>EN19</option>"+
"<option>EN24</option>"+
"<option>EN31</option>"+
"<option>EN353</option>"+
"<option>OHNS</option>"+
"<option>HCHCR</option>"+
"<option>D2</option>"+
"<option>D3</option>"+
"</select>"+

"<select id='shape"+itemCount+"'>"+
"<option>Round</option>"+
"<option>Flat</option>"+
"<option>Square</option>"+
"<option>Hexagon</option>"+
"</select>"+

"<input id='size"+itemCount+"' placeholder='Size'>"+
"<input id='width"+itemCount+"' placeholder='Width'>"+
"<input id='thickness"+itemCount+"' placeholder='Thickness'>"+
"<input id='length"+itemCount+"' placeholder='Cutting Length'>"+
"<input id='qty"+itemCount+"' placeholder='Quantity'>"+

"<button class='removebtn' onclick='removeItem("+itemCount+")'>Remove Item</button>";

container.appendChild(div);

updateShape(itemCount);

}

function removeItem(id){

let el=document.getElementById("item"+id);

if(el){
el.remove();
}

}

function updateShape(id){

let grade=document.getElementById("grade"+id).value;

let shape=document.getElementById("shape"+id);

shape.innerHTML="";

if(grade=="MS Bright" || grade=="EN8"){

shape.innerHTML="<option>Hexagon</option>";

}
else if(grade=="EN19" || grade=="EN24" || grade=="EN353"){

shape.innerHTML="<option>Round</option>";

}
else{

shape.innerHTML=
"<option>Round</option>"+
"<option>Flat</option>"+
"<option>Square</option>"+
"<option>Hexagon</option>";

}

}

function send(){

let message="New Order Enquiry - Veldhan Steels\n\n";

for(let i=1;i<=itemCount;i++){

let item=document.getElementById("item"+i);

if(item){

let grade=document.getElementById("grade"+i).value;
let shape=document.getElementById("shape"+i).value;
let size=document.getElementById("size"+i).value;
let width=document.getElementById("width"+i).value;
let thickness=document.getElementById("thickness"+i).value;
let length=document.getElementById("length"+i).value;
let qty=document.getElementById("qty"+i).value;

message+="Item "+i+"\n";
message+="Grade: "+grade+"\n";
message+="Shape: "+shape+"\n";
message+="Size: "+size+"\n";
message+="Width: "+width+"\n";
message+="Thickness: "+thickness+"\n";
message+="Cutting Length: "+length+"\n";
message+="Quantity: "+qty+"\n\n";

}

}

message+="Customer Name: "+document.getElementById("name").value+"\n";
message+="Company: "+document.getElementById("company").value+"\n";
message+="Phone: "+document.getElementById("phone").value+"\n";
message+="Location: "+document.getElementById("location").value;

let url="https://wa.me/919994609695?text="+encodeURIComponent(message);

window.location.href=url;

}

addItem();

</script>

</body>
</html>
