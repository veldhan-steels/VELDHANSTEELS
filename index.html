<!DOCTYPE html>
<html>
<head>
<title>Veldhan Steels</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:20px;}
button{padding:15px 25px;margin:10px;font-size:16px;border:none;border-radius:8px;background:#25D366;color:white;}
input,select{padding:10px;margin:5px;width:90%;}
</style>
</head>

<body>

<h1>Veldhan Steels</h1>
<p>Bright Steel Bars • EN Series • Alloys</p>

<h2>Order Enquiry</h2>

<select id="grade">
<option>MS Bright</option>
<option>EN8</option>
<option>EN19</option>
<option>EN24</option>
<option>EN31</option>
<option>OHNS</option>
<option>HCHCR</option>
<option>D3</option>
</select>

<select id="shape">
<option>Round</option>
<option>Flat</option>
<option>Square</option>
<option>Hexagon</option>
</select>

<input placeholder="Width / Diameter">
<input placeholder="Thickness">
<input placeholder="Cutting Length">
<input placeholder="Quantity">

<input placeholder="Customer Name">
<input placeholder="Company Name">
<input placeholder="Phone">
<input placeholder="Location">

<br><br>

<button onclick="send()">Send Enquiry</button>

<script>
function send(){ 

  let grade=document.getElementById("grade").value;
  let shape=document.getElementById("shape").value;
  let width=document.getElementById("width").value;
  let thickness=document.getElementById("thickness").value;
  let length=document.getElementById("length").value;
  let qty=document.getElementById("qty").value;
  let name=document.getElementById("name").value;
  let company=document.getElementById("company").value;
  let phone=document.getElementById("phone").value;
  let location=document.getElementById("location").value;

  let text =
  "New Order Enquiry - Veldhan Steels\n\n"+
  "Grade: "+grade+"\n"+
  "Shape: "+shape+"\n"+
  "Width/Dia: "+width+"\n"+
  "Thickness: "+thickness+"\n"+
  "Cutting Length: "+length+"\n"+
  "Quantity: "+qty+"\n\n"+
  "Customer: "+name+"\n"+
  "Company: "+company+"\n"+
  "Phone: "+phone+"\n"+
  "Location: "+location;

  window.open("https://wa.me/919994609695?text="+encodeURIComponent(text));

  }
}
</script>

</body>
  </html>
