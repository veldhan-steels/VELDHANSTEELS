<!DOCTYPE html>
<html>

<head>
<title>Veldhan Steels</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input,select{
padding:10px;
margin:6px;
width:90%;
font-size:16px;
}

button{
padding:15px 25px;
font-size:18px;
background:#25D366;
border:none;
color:white;
margin-top:15px;
}

</style>
</head>

<body>

<h1>Veldhan Steels</h1>
<p>Bright Steel Bars • EN Series • Alloys</p>

<h2>Order Enquiry</h2>

<select id="grade">
<option>MS Bright</option>
<option>EN8</option>
<option>EN19</option>
<option>EN24</option>
<option>EN31</option>
<option>OHNS</option>
<option>HCHCR</option>
<option>D2</option>
<option>D3</option>
</select>

<select id="shape">
<option>Round</option>
<option>Flat</option>
<option>Square</option>
<option>Hexagon</option>
</select>

<input id="size" placeholder="Width / Diameter">

<input id="thickness" placeholder="Thickness">

<input id="length" placeholder="Cutting Length">

<input id="qty" placeholder="Quantity">

<input id="name" placeholder="Customer Name">

<input id="company" placeholder="Company Name">

<input id="phone" placeholder="Phone">

<input id="location" placeholder="Location">

<br><br>

<button type="button" onclick="send()">Send Enquiry</button>
<script>

  function send(){

  var grade = document.getElementById("grade").value;
  var shape = document.getElementById("shape").value;
  var size = document.getElementById("size").value;
  var thickness = document.getElementById("thickness").value;
  var length = document.getElementById("length").value;
  var qty = document.getElementById("qty").value;
  var name = document.getElementById("name").value;
  var company = document.getElementById("company").value;
  var phoneInput = document.getElementById("phone").value;
  var location = document.getElementById("location").value;

  var message =
  "New Order Enquiry - Veldhan Steels\n\n"+
  "Grade: "+grade+"\n"+
  "Shape: "+shape+"\n"+
  "Size / Diameter: "+size+"\n"+
  "Thickness: "+thickness+"\n"+
  "Cutting Length: "+length+"\n"+
  "Quantity: "+qty+"\n"+
  "Customer Name: "+name+"\n"+
  "Company: "+company+"\n"+
  "Phone: "+phoneInput+"\n"+
  "Location: "+location;

  var url = "https://wa.me/919994609695?text=" + encodeURIComponent(message);

  window.location.href = url;

  }

  </script>
</body>
</html>
